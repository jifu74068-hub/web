<!doctype html>
<html lang="en">
  <head>
    <title>Belajar Form</title>
  </head>
  <body>
    <form>
      <!-- Input Nama -->
      <label for="nama">Masukkan Nama</label>
      <input type="text" id="nama" />
      <br />
      <br />

      <!-- Input Email -->
      <label for="email">Email</label>
      <input type="text" id="email" />
      <br />
      <br />

      <!-- Jenis Kelamin -->
      <label for="jenis_kelamin">Jenis Kelamin</label>
      <input type="radio" id="laki" name="jenis_kelamin" value="Laki-laki" />
      <label for="laki">Laki-laki</label>
      <input
        type="radio"
        id="perempuan"
        name="jenis_kelamin"
        value="Perempuan"
      />
      <label for="perempuan">Perempuan</label>
      <br />
      <br />

      <!-- Input Hobi -->
      <label for="hobi">Hobi</label>
      <input type="checkbox" value="membaca" id="baca" />
      <label for="baca">Membaca</label>
      <input type="checkbox" value="berenang" id="renang" />
      <label for="renang">Berenang</label>
      <input type="checkbox" value="nonton" id="nonton" />
      <label for="nonton">Nonton</label>
      <br />
      <br />

      <!-- Tombol Kirim -->
      <button type="submit">Kirim Data</button>
    </form>
  </body>
</html>
