<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="p-5 text-center bg-info">
        <div class="container py-5">
          <h1 class="text-body-emphasis">Kuliner Nusantara</h1>
          <p class="col-lg-8 mx-auto lead">
            Lezat, Tradisional, dan Terjangkau.
          </p>
        </div>
      </div>
    </header>

    <nav class="bg-info-subtle">
      <ul class="nav justify-content-center">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="product.html">Product</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>
      </ul>
    </nav>

    <section>
      <div class="container px-4 py-5" id="hanging-icons">
        <h2 class="pb-2 border-bottom">Kontak Kami</h2>
        <div class="row g-4 py-5 row-cols-1 row-cols-lg-3">
          <div class="col d-flex align-items-start">
            <div
              class="icon-square text-body-emphasis bg-body-secondary d-inline-flex align-items-center justify-content-center fs-4 flex-shrink-0 me-3"
            >
              <i class="bi bi-house-check-fill fs-1"></i>
            </div>
            <div>
              <h3 class="fs-2 text-body-emphasis">Alamat</h3>
              <p>Jl. Kuliner No. 123</p>
            </div>
          </div>
          <div class="col d-flex align-items-start">
            <div
              class="icon-square text-body-emphasis bg-body-secondary d-inline-flex align-items-center justify-content-center fs-4 flex-shrink-0 me-3"
            >
              <img src="img/phone-vibrate.svg" alt="telepon" width="50" />
            </div>
            <div>
              <h3 class="fs-2 text-body-emphasis">Telepon</h3>
              <p>0812-3456-7890</p>
            </div>
          </div>
          <div class="col d-flex align-items-start">
            <div
              class="icon-square text-body-emphasis bg-body-secondary d-inline-flex align-items-center justify-content-center fs-4 flex-shrink-0 me-3"
            >
              <img src="img/envelope.svg" alt="email" width="50" />
            </div>
            <div>
              <h3 class="fs-2 text-body-emphasis">Email</h3>
              <p>kuliner@email.com</p>
            </div>
          </div>
        </div>

        <form>
          <h2 class="pb-2 mb-4">Kirim Pesan</h2>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" />
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label"
              >Email address</label
            >
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
            />
          </div>
          <div class="mb-3">
            <label for="subject" class="form-label">Subject</label>
            <input type="text" class="form-control" id="subject" />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea
              class="form-control"
              id="floatingTextarea2"
              style="height: 100px"
            ></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
    </section>

    <footer class="bg-info-subtle">
      <div class="container">
        <footer class="py-3 my-4">
          <ul class="nav justify-content-center border-bottom pb-3 mb-3">
            <li class="nav-item">
              <a href="index.html" class="nav-link px-2 text-body-secondary"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a href="product.html" class="nav-link px-2 text-body-secondary"
                >Product</a
              >
            </li>
            <li class="nav-item">
              <a href="about.html" class="nav-link px-2 text-body-secondary"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a href="contact.html" class="nav-link px-2 text-body-secondary"
                >Contact</a
              >
            </li>
          </ul>
          <p class="text-center text-body-secondary">
            © 2026 Kuliner Nusantara
          </p>
        </footer>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
