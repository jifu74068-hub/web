<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header>
      <div class="p-5 text-center bg-info">
        <div class="container py-5">
          <h1 class="text-body-emphasis">Kuliner Nusantara</h1>
          <p class="col-lg-8 mx-auto lead">
            Lezat, Tradisional, dan Terjangkau.
          </p>
        </div>
      </div>
    </header>

    <nav class="bg-info-subtle">
      <ul class="nav justify-content-center">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="product.html">Product</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="about.html">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contact.html">Contact</a>
        </li>
      </ul>
    </nav>

    <section>
      <div class="container px-4 py-5" id="hanging-icons">
        <form>
          <h2 class="pb-2 mb-4">Create New</h2>
          <div class="mb-3">
            <label for="name" class="form-label">Nama Produk</label>
            <input type="text" class="form-control" id="name" />
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Kategori</label>
            <input
              type="email"
              class="form-control"
              id="exampleInputEmail1"
              aria-describedby="emailHelp"
            />
          </div>
          <div class="mb-3">
            <label for="subject" class="form-label">Harga</label>
            <input type="text" class="form-control" id="subject" />
          </div>
          <button type="submit" class="btn btn-primary">Save</button>
          <a href="product.html" class="btn btn-warning">Back</a>
        </form>
      </div>
    </section>

    <footer class="bg-info-subtle">
      <div class="container">
        <footer class="py-3 my-4">
          <ul class="nav justify-content-center border-bottom pb-3 mb-3">
            <li class="nav-item">
              <a href="index.html" class="nav-link px-2 text-body-secondary"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a href="product.html" class="nav-link px-2 text-body-secondary"
                >Product</a
              >
            </li>
            <li class="nav-item">
              <a href="about.html" class="nav-link px-2 text-body-secondary"
                >About</a
              >
            </li>
            <li class="nav-item">
              <a href="contact.html" class="nav-link px-2 text-body-secondary"
                >Contact</a
              >
            </li>
          </ul>
          <p class="text-center text-body-secondary">
            © 2026 Kuliner Nusantara
          </p>
        </footer>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
