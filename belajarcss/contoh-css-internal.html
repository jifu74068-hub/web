<!doctype html>
<html lang="en">
  <head>
    <title>Belajar CSS</title>
    <style>
      h1 {
        color: red;
      }
      #pertama {
        background-color: aqua;
      }

      #kedua {
        color: blue;
        font-size: 200%;
      }
    </style>
  </head>
  <body>
    <h1>Belajar CSS</h1>
    <p id="pertama">Hari ini kita akan mempelajari tentang CSS pada HTML</p>
    <p id="kedua">
      Ini adalah teks dengan style warna biru dan ukuran font 200%
    </p>
  </body>
</html>
